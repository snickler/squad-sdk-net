name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Squad.SDK.NET.slnx

    - name: Build
      run: dotnet build Squad.SDK.NET.slnx --no-restore -c Release

    - name: Test
      run: dotnet test Squad.SDK.NET.slnx --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: "Gate: Prerelease Version Guard"
      if: >-
        matrix.os == 'ubuntu-latest'
        && github.event_name == 'pull_request'
        && github.event.pull_request.base.ref != 'insider'
      shell: pwsh
      run: |
        "## 🏷️ Prerelease Version Guard" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

        $csprojPath = "src/Squad.SDK.NET/Squad.SDK.NET.csproj"
        [xml]$csproj = Get-Content -Raw $csprojPath
        $version = @($csproj.Project.PropertyGroup | ForEach-Object { $_.Version }) |
          Where-Object { $_ -and -not [string]::IsNullOrWhiteSpace($_) } |
          Select-Object -First 1

        if ([string]::IsNullOrWhiteSpace($version)) {
          Write-Error "PACKAGE VERSION COULD NOT BE DETERMINED — no non-empty <Version> element was found in $csprojPath."
          Write-Error ""
          Write-Error "Ensure $csprojPath contains a non-empty <Version>...</Version> value in a PropertyGroup."
          exit 1
        }

        if ($version -match '-') {
          Write-Error "PRERELEASE VERSION DETECTED — package version '$version' has a prerelease suffix and cannot merge to dev/main."
          Write-Error ""
          Write-Error "  $csprojPath has <Version>$version</Version>"
          Write-Error ""
          Write-Error "Prerelease suffixes (-alpha, -beta, -rc, -preview) must be removed before merging."
          Write-Error "To fix: update <Version> in $csprojPath to a release version (e.g., remove the hyphen and suffix)."
          exit 1
        }

        Write-Host "✅ Package version is a release version (no prerelease suffix): $version"

    - name: Pack
      run: dotnet pack src/Squad.SDK.NET/Squad.SDK.NET.csproj --no-build -c Release -o ./artifacts
      if: matrix.os == 'ubuntu-latest'

    - name: Upload NuGet package
      uses: actions/upload-artifact@v7
      if: matrix.os == 'ubuntu-latest'
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg

    - name: Upload coverage
      uses: actions/upload-artifact@v7
      if: matrix.os == 'ubuntu-latest'
      with:
        name: coverage-report
        path: '**/TestResults/**/coverage.cobertura.xml'

  publish-ci:
    name: Publish CI package to GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Squad.SDK.NET.slnx

    - name: Set CI version
      id: ci-version
      run: |
        BASE=$(dotnet msbuild src/Squad.SDK.NET/Squad.SDK.NET.csproj -getProperty:Version --verbosity quiet)
        echo "version=${BASE}-ci.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

    - name: Pack
      run: |
        dotnet pack src/Squad.SDK.NET/Squad.SDK.NET.csproj \
          --no-restore \
          -c Release \
          -o ./artifacts \
          -p:Version=${{ steps.ci-version.outputs.version }}

    - name: Publish to GitHub Packages
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key "${{ secrets.GITHUB_TOKEN }}" \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --skip-duplicate

  publish-dev:
    name: Publish dev package to GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Squad.SDK.NET.slnx

    - name: Set dev version
      id: dev-version
      run: |
        BASE=$(dotnet msbuild src/Squad.SDK.NET/Squad.SDK.NET.csproj -getProperty:Version --verbosity quiet)
        echo "version=${BASE}-dev" >> "$GITHUB_OUTPUT"

    - name: Pack
      run: |
        dotnet pack src/Squad.SDK.NET/Squad.SDK.NET.csproj \
          --no-restore \
          -c Release \
          -o ./artifacts \
          -p:Version=${{ steps.dev-version.outputs.version }}

    - name: Publish to GitHub Packages
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key "${{ secrets.GITHUB_TOKEN }}" \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --skip-duplicate