name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Squad.SDK.NET.slnx

    - name: Build
      run: dotnet build Squad.SDK.NET.slnx --no-restore -c Release

    - name: Test
      run: dotnet test Squad.SDK.NET.slnx --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Pack
      run: dotnet pack src/Squad.SDK.NET/Squad.SDK.NET.csproj --no-build -c Release -o ./artifacts
      if: matrix.os == 'ubuntu-latest'

    - name: Upload NuGet package
      uses: actions/upload-artifact@v7
      if: matrix.os == 'ubuntu-latest'
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg

    - name: Upload coverage
      uses: actions/upload-artifact@v7
      if: matrix.os == 'ubuntu-latest'
      with:
        name: coverage-report
        path: '**/TestResults/**/coverage.cobertura.xml'