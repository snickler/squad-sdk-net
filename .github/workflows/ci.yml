name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-version:
    name: Verify version format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Check version against target branch
        shell: pwsh
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          $version = (Select-Xml -Path src/Squad.SDK.NET/Squad.SDK.NET.csproj -XPath '//Version').Node.InnerText
          $targetBranch = $env:BASE_REF
          $isPreRelease = $version -match '-'

          Write-Host "Version : $version"
          Write-Host "Target  : $targetBranch"

          if ($targetBranch -eq 'main') {
            if ($isPreRelease) {
              Write-Error "❌ Version '$version' contains a prerelease suffix. PRs to 'main' must use a stable version (e.g., 0.2.0). Update <Version> in Squad.SDK.NET.csproj and CHANGELOG.md before merging."
              exit 1
            }
            Write-Host "✅ Stable version '$version' is valid for 'main'."
          } elseif ($targetBranch -eq 'dev') {
            if (-not $isPreRelease) {
              Write-Warning "⚠️  Version '$version' has no prerelease suffix. The 'dev' branch conventionally carries a prerelease version (e.g., 0.2.0-preview.1). Run scripts/bump-version.ps1 to update it."
            } else {
              Write-Host "✅ Prerelease version '$version' is valid for 'dev'."
            }
          } else {
            Write-Host "ℹ️  Skipping version check for branch '$targetBranch'."
          }

  build:
    runs-on: ${{ matrix.os }}
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Squad.SDK.NET.slnx

    - name: Build
      run: dotnet build Squad.SDK.NET.slnx --no-restore -c Release

    - name: Test
      run: dotnet test Squad.SDK.NET.slnx --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Pack
      run: dotnet pack src/Squad.SDK.NET/Squad.SDK.NET.csproj --no-build -c Release -o ./artifacts
      if: matrix.os == 'ubuntu-latest'

    - name: Upload NuGet package
      uses: actions/upload-artifact@v7
      if: matrix.os == 'ubuntu-latest'
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg

    - name: Upload coverage
      uses: actions/upload-artifact@v7
      if: matrix.os == 'ubuntu-latest'
      with:
        name: coverage-report
        path: '**/TestResults/**/coverage.cobertura.xml'

  publish-ci:
    name: Publish CI package to GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Squad.SDK.NET.slnx

    - name: Set CI version
      id: ci-version
      run: |
        BASE=$(dotnet msbuild src/Squad.SDK.NET/Squad.SDK.NET.csproj -getProperty:Version --verbosity quiet)
        echo "version=${BASE}-ci.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

    - name: Pack
      run: |
        dotnet pack src/Squad.SDK.NET/Squad.SDK.NET.csproj \
          --no-restore \
          -c Release \
          -o ./artifacts \
          -p:Version=${{ steps.ci-version.outputs.version }}

    - name: Publish to GitHub Packages
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key "${{ secrets.GITHUB_TOKEN }}" \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --skip-duplicate

  publish-dev:
    name: Publish dev package to GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Squad.SDK.NET.slnx

    - name: Set dev version
      id: dev-version
      run: |
        BASE=$(dotnet msbuild src/Squad.SDK.NET/Squad.SDK.NET.csproj -getProperty:Version --verbosity quiet)
        echo "version=${BASE}-dev" >> "$GITHUB_OUTPUT"

    - name: Pack
      run: |
        dotnet pack src/Squad.SDK.NET/Squad.SDK.NET.csproj \
          --no-restore \
          -c Release \
          -o ./artifacts \
          -p:Version=${{ steps.dev-version.outputs.version }}

    - name: Publish to GitHub Packages
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key "${{ secrets.GITHUB_TOKEN }}" \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --skip-duplicate