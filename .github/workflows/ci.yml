name: CI

on:
  push:
    branches: [ main, init ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'
    
    - name: Restore dependencies
      run: dotnet restore Squad.SDK.NET.slnx
    
    - name: Build
      run: dotnet build Squad.SDK.NET.slnx --no-restore -c Release
    
    - name: Test
      run: dotnet test Squad.SDK.NET.slnx --no-build -c Release --verbosity normal