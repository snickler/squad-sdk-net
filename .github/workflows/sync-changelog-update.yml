name: "Sync: Update CHANGELOG on Completion"

on:
  issues:
    types: [closed]

concurrency:
  group: sync-changelog-update
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    # Only run when a sync phase issue (dev or insider) is closed and contains our marker
    if: |
      (contains(github.event.issue.labels.*.name, 'sync:dev') ||
       contains(github.event.issue.labels.*.name, 'sync:insider')) &&
      contains(github.event.issue.body, '<!-- sync-issue-marker -->')

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v6
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update CHANGELOG
        uses: actions/github-script@v8
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const fs = require('fs');

            const issueBody = process.env.ISSUE_BODY || '';
            const issueNumber = process.env.ISSUE_NUMBER;
            const labels = context.payload.issue.labels.map(l => l.name);
            const isSyncDev = labels.includes('sync:dev');
            const UPSTREAM = 'bradygaster/squad';

            // Extract a SHA embedded as <!-- marker: <sha> --> in the issue body
            // Accept both upper- and lower-case hex and trim any surrounding whitespace
            const extractSha = (body, marker) => {
              const regex = new RegExp(`<!--\\s*${marker}:\\s*([a-f0-9]+)\\s*-->`, 'i');
              const m = body.match(regex);
              return m ? m[1].trim().toLowerCase() : null;
            };

            const expectedMarker = isSyncDev ? 'dev-target-sha' : 'insider-target-sha';
            const sha = extractSha(issueBody, expectedMarker);

            if (!sha) {
              throw new Error(
                `Missing required <!-- ${expectedMarker}: <sha> --> marker in sync issue #${issueNumber}; ` +
                'refusing to update CHANGELOG.md with an unknown upstream SHA.'
              );
            }

            const upstreamBranch = isSyncDev ? 'dev' : 'insider';
            const shaShort = sha.substring(0, 7);
            const shaLink = `[\`${shaShort}\`](https://github.com/${UPSTREAM}/commit/${sha})`;

            const syncLine = `- Synced upstream \`${upstreamBranch}\`@${shaLink} (closes #${issueNumber})`;

            // ── Patch CHANGELOG.md ──────────────────────────────────────────────
            let changelog = fs.readFileSync('CHANGELOG.md', 'utf8');

            // Idempotency: skip if this exact entry is already present
            if (changelog.split(/\r?\n/).some(line => line.trim() === syncLine)) {
              core.info(`CHANGELOG already contains sync entry — skipping: ${syncLine}`);
            } else {
              const UNRELEASED = '## [Unreleased]';
              const SYNC_H = '### Sync';

              if (changelog.includes(UNRELEASED)) {
                // Locate the [Unreleased] section and patch within its boundaries
                const unreleasedStart = changelog.indexOf(UNRELEASED);
                const afterUnreleased = unreleasedStart + UNRELEASED.length;
                const nextSectionOffset = changelog.slice(afterUnreleased).search(/\n## \[/);
                const unreleasedEnd = nextSectionOffset >= 0
                  ? afterUnreleased + nextSectionOffset + 1
                  : changelog.length;
                let unreleasedBlock = changelog.slice(unreleasedStart, unreleasedEnd);

                if (unreleasedBlock.includes(SYNC_H)) {
                  // Prepend under the existing ### Sync heading inside [Unreleased]
                  unreleasedBlock = unreleasedBlock.replace(
                    SYNC_H + '\n',
                    `${SYNC_H}\n${syncLine}\n`
                  );
                } else {
                  // Add ### Sync section at the top of [Unreleased]
                  unreleasedBlock = unreleasedBlock.replace(
                    UNRELEASED + '\n',
                    `${UNRELEASED}\n\n${SYNC_H}\n${syncLine}\n`
                  );
                }

                changelog =
                  changelog.slice(0, unreleasedStart) +
                  unreleasedBlock +
                  changelog.slice(unreleasedEnd);
              } else {
                // Insert [Unreleased] block before the first versioned entry
                const firstVerIdx = changelog.search(/^## \[/m);
                const entry = `${UNRELEASED}\n\n${SYNC_H}\n${syncLine}\n\n`;
                changelog = firstVerIdx >= 0
                  ? changelog.slice(0, firstVerIdx) + entry + changelog.slice(firstVerIdx)
                  : changelog + '\n' + entry;
              }

              fs.writeFileSync('CHANGELOG.md', changelog);
              core.info(`CHANGELOG updated: ${syncLine}`);
            }

      - name: Commit and push
        id: commit_and_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            # Pull with rebase to handle any commits that landed since checkout
            git pull --rebase origin dev
            git commit -m "chore: record sync in CHANGELOG (closes #${{ github.event.issue.number }})"
            git push origin dev
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on closed issue
        uses: actions/github-script@v8
        env:
          CHANGELOG_COMMITTED: ${{ steps.commit_and_push.outputs.committed }}
        with:
          script: |
            const committed = process.env.CHANGELOG_COMMITTED === 'true';
            const body = committed
              ? '📝 **CHANGELOG updated** — a sync entry has been recorded on the `dev` branch.'
              : 'ℹ️ **No CHANGELOG update was needed** — no changelog changes were detected, so nothing was committed to the `dev` branch.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
            core.info(`Posted issue comment for changelog sync result: committed=${committed}`);
