name: "Sync Check: insider"

on:
  schedule:
    - cron: '0 8 * * 1-5'   # Weekdays at 08:00 UTC
  workflow_dispatch:

concurrency:
  group: sync-check-insider
  cancel-in-progress: true

jobs:
  sync-insider:
    uses: ./.github/workflows/sync-check.yml
    with:
      upstream-repo: 'bradygaster/squad'
      upstream-branch: 'insider'
      sync-label: 'sync:insider'
    permissions:
      issues: write
      contents: read
