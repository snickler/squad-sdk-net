name: "Sync Check: Upstream"

on:
  schedule:
    - cron: '0 8 * * 1-5'   # Weekdays at 08:00 UTC
  workflow_dispatch:

concurrency:
  group: sync-check-upstream
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (read tracking state)
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Fetch upstream and origin branches
        run: |
          git remote add upstream https://github.com/bradygaster/squad.git
          git fetch upstream dev insider --no-tags
          git fetch origin dev --no-tags

      - name: Check upstream and create or update sync issue
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            // === Configuration ===
            const UPSTREAM = 'bradygaster/squad';
            const TRACKING_FILE = '.sync/upstream-state.json';
            const ISSUE_MARKER = '<!-- sync-issue-marker -->';

            const run = (cmd) => {
              try {
                return execSync(cmd, { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] }).trim();
              } catch (err) {
                return null;
              }
            };

            const runOrFail = (cmd, context) => {
              try {
                return execSync(cmd, { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] }).trim();
              } catch (err) {
                core.setFailed(`${context}: ${err.message}`);
                return null;
              }
            };

            const sanitize = (msg) => msg.replace(/@/g, '`@`');

            // === Read tracking state ===
            let state = {
              upstream: UPSTREAM,
              dev: { lastPortedSha: null, lastChecked: null },
              insider: { lastPortedSha: null, lastChecked: null }
            };

            try {
              if (fs.existsSync(TRACKING_FILE)) {
                state = JSON.parse(fs.readFileSync(TRACKING_FILE, 'utf8'));
                core.info('Loaded tracking state from .sync/upstream-state.json');
              } else {
                core.warning('Tracking file not found — running in bootstrap mode');
              }
            } catch (err) {
              core.warning(`Could not parse tracking file: ${err.message} — running in bootstrap mode`);
            }

            // === Resolve upstream HEADs ===
            const devHead = runOrFail('git rev-parse upstream/dev', 'Resolve upstream/dev');
            if (!devHead) return;

            const insiderHead = runOrFail('git rev-parse upstream/insider', 'Resolve upstream/insider');
            if (!insiderHead) return;

            core.info(`Upstream dev HEAD:     ${devHead.substring(0, 7)}`);
            core.info(`Upstream insider HEAD: ${insiderHead.substring(0, 7)}`);

            // Capture our current dev branch HEAD (for phase 2 cherry-pick range)
            const ourDevHead = run('git rev-parse origin/dev');
            core.info(`Our dev HEAD:          ${ourDevHead?.substring(0, 7) || '(unknown)'}`);

            const trackedDev = state.dev?.lastPortedSha || null;
            const trackedInsider = state.insider?.lastPortedSha || null;

            core.info(`Tracked dev:     ${trackedDev?.substring(0, 7) || '(none)'}`);
            core.info(`Tracked insider: ${trackedInsider?.substring(0, 7) || '(none)'}`);

            const devChanged = devHead !== trackedDev;
            const insiderChanged = insiderHead !== trackedInsider;

            if (!devChanged && !insiderChanged) {
              core.info('No new upstream changes — both branches match tracked state');
              return;
            }

            // === Helper: check if a SHA exists in fetched history ===
            function shaExists(sha) {
              return run(`git cat-file -e ${sha}`) !== null;
            }

            // === Analyze each branch ===
            function analyzeBranch(name, trackedSha, headSha) {
              const changed = headSha !== trackedSha;
              const result = {
                name,
                changed,
                headSha,
                trackedSha,
                commits: [],
                diffStat: '',
                needsRebaseline: false,
                isBootstrap: false,
              };

              if (!changed) return result;

              if (trackedSha && shaExists(trackedSha)) {
                const log = run(`git log --format="%H %s" ${trackedSha}..upstream/${name}`);
                result.commits = log ? log.split('\n').filter(Boolean) : [];
                result.diffStat = run(`git diff --stat ${trackedSha}..upstream/${name}`) || '';
              } else if (trackedSha) {
                result.needsRebaseline = true;
                core.warning(`Tracked SHA ${trackedSha.substring(0, 7)} not found on upstream/${name} — history may have been rewritten`);
              } else {
                result.isBootstrap = true;
                const log = run(`git log --format="%H %s" -50 upstream/${name}`);
                result.commits = log ? log.split('\n').filter(Boolean) : [];
              }

              return result;
            }

            const dev = analyzeBranch('dev', trackedDev, devHead);
            const insider = analyzeBranch('insider', trackedInsider, insiderHead);

            // === Compute upstream dev ↔ insider delta ===
            const deltaLog = run('git log --format="%H %s" upstream/insider..upstream/dev');
            const deltaStat = run('git diff --stat upstream/insider..upstream/dev');

            // === Format helpers ===
            function formatCommits(entries) {
              if (!entries.length) return '_No commits to display_';
              return entries.slice(0, 30).map(line => {
                const spaceIdx = line.indexOf(' ');
                const sha = line.substring(0, spaceIdx);
                const msg = sanitize(line.substring(spaceIdx + 1));
                return `- [\`${sha.substring(0, 7)}\`](https://github.com/${UPSTREAM}/commit/${sha}) ${msg}`;
              }).join('\n') + (entries.length > 30 ? `\n- _… and ${entries.length - 30} more commits_` : '');
            }

            function buildBranchSection(branch) {
              const emoji = branch.name === 'dev' ? '📦' : '🔒';
              const header = `## ${emoji} \`${branch.name}\` Branch`;

              if (!branch.changed) {
                return `${header}\n\n✅ No new upstream changes since \`${branch.trackedSha?.substring(0, 7) || 'N/A'}\`.`;
              }

              if (branch.needsRebaseline) {
                return [
                  `${header} — ⚠️ Re-baseline Required`,
                  '',
                  `Our tracked SHA \`${branch.trackedSha.substring(0, 7)}\` was **not found** on upstream \`${branch.name}\`.`,
                  'This likely means the upstream branch was force-pushed or its history was rewritten.',
                  '',
                  '**Action required:** Review the upstream branch and update `.sync/upstream-state.json` with a valid baseline SHA.',
                  '',
                  `| Field | Value |`,
                  `|-------|-------|`,
                  `| Upstream HEAD | \`${branch.headSha.substring(0, 7)}\` |`,
                  `| Our tracked SHA | \`${branch.trackedSha.substring(0, 7)}\` (missing) |`,
                ].join('\n');
              }

              const parts = [`${header}: Changes to Port`, ''];

              if (branch.isBootstrap) {
                parts.push(
                  '> **Initial sync** — No previous baseline recorded. Showing recent commits for context.',
                  '> After porting, set `lastPortedSha` in `.sync/upstream-state.json` to the SHA you ported up to.',
                  ''
                );
              } else {
                parts.push(
                  `Our \`${branch.name}\` branch is based on upstream commit \`${branch.trackedSha.substring(0, 7)}\`.`,
                  ''
                );
              }

              parts.push(
                `Upstream \`${branch.name}\` HEAD: \`${branch.headSha.substring(0, 7)}\` — **${branch.commits.length}** new commit${branch.commits.length !== 1 ? 's' : ''}.`,
                '',
                '### Commits',
                '',
                formatCommits(branch.commits),
              );

              if (branch.diffStat) {
                parts.push('', '### Files Changed', '', '```', branch.diffStat, '```');
              }

              return parts.join('\n');
            }

            // === Build issue body ===
            const date = new Date().toISOString().split('T')[0];

            const devSection = buildBranchSection(dev);
            const insiderSection = buildBranchSection(insider);

            // Dev ↔ insider delta section
            const deltaCommits = deltaLog ? deltaLog.split('\n').filter(Boolean) : [];
            const deltaSection = [
              '## 🔀 Upstream `dev` ↔ `insider` Delta',
              '',
              'Changes in upstream `dev` that are **not** in upstream `insider`:',
              '',
            ];

            if (deltaCommits.length > 0) {
              deltaSection.push(
                '### Commits',
                '',
                formatCommits(deltaCommits),
              );
            } else {
              deltaSection.push('_Branches are identical — no delta._');
            }

            if (deltaStat) {
              deltaSection.push('', '### File Diff', '', '```', deltaStat, '```');
            }

            deltaSection.push(
              '',
              '> **Branching model:** Our `dev` branch always has the latest upstream changes.',
              '> Our `insider` branch only implements up to the upstream `insider` branch\'s latest commit set.',
            );

            const title = `Sync: upstream dev changes — ${date}`;
            const body = [
              ISSUE_MARKER,
              `<!-- dev-target-sha: ${devHead} -->`,
              `<!-- insider-target-sha: ${insiderHead} -->`,
              `<!-- our-dev-head: ${ourDevHead || 'unknown'} -->`,
              '',
              `📦 **Phase 1: Port upstream \`dev\` changes**`,
              '',
              `New changes detected in [${UPSTREAM}](https://github.com/${UPSTREAM}) \`dev\` branch that need to be ported to our .NET implementation.`,
              '',
              '> **Instructions:**',
              '> 1. Port the `dev` branch commits listed below to our `dev` branch',
              '> 2. Reference upstream commit SHAs in your commit messages when practical (e.g., "Port feature X (upstream/dev@a1b2c3d)")',
              '> 3. Update `dev.lastPortedSha` in `.sync/upstream-state.json` to the target SHA below',
              '> 4. Verify builds pass on `dev`',
              '> 5. Close this issue — the insider sync (phase 2) will trigger automatically',
              '',
              devSection,
              '',
              '---',
              '',
              deltaSection.join('\n'),
              '',
              '> 📌 **Context:** The delta above shows what\'s in upstream `dev` but NOT in `insider`.',
              '> This helps you understand the insider boundary when porting.',
              '> Phase 2 (insider sync) will determine which of your dev commits to cherry-pick.',
              '',
              '## 📊 Sync State',
              '',
              '| Branch | Our Tracked SHA | Upstream HEAD | Status |',
              '|--------|----------------|---------------|--------|',
              `| dev | \`${trackedDev?.substring(0, 7) || 'none'}\` | \`${devHead.substring(0, 7)}\` | 🔴 Changes pending |`,
              `| insider | \`${trackedInsider?.substring(0, 7) || 'none'}\` | \`${insiderHead.substring(0, 7)}\` | ⏸️ Handled in phase 2 |`,
              '',
              '## ✅ Completion Checklist',
              '',
              '- [ ] Port upstream `dev` commits to our `dev` branch',
              `- [ ] Update \`.sync/upstream-state.json\`: set \`dev.lastPortedSha\` → \`${devHead}\``,
              '- [ ] Verify build passes on `dev` branch',
              '- [ ] Close this issue (phase 2 will auto-trigger)',
            ].join('\n');

            // === Phase 1: Create dev-only sync issue ===
            // Skip if ONLY insider changed (handled by phase 2)
            if (!devChanged) {
              core.info('Only insider branch changed — skipped (phase 2 handles insider independently)');
              return;
            }

            // === Determine labels ===
            const labels = ['sync', 'sync:dev', 'squad', 'squad:copilot'];

            // === Ensure labels exist (race-safe: ignore 422) ===
            const labelDefs = {
              'sync':          { color: 'F9D0C4', description: 'Upstream sync tracking' },
              'sync:dev':      { color: 'FEF2C0', description: 'Changes on upstream dev branch' },
              'sync:insider':  { color: 'C2E0C6', description: 'Changes on upstream insider branch' },
              'squad':         { color: '9B8FCC', description: 'Squad triage inbox' },
              'squad:copilot': { color: '0E8A16', description: 'Assigned to Copilot coding agent' },
            };

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch (err) {
                if (err.status === 404) {
                  try {
                    const def = labelDefs[label] || { color: 'EDEDED', description: '' };
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label,
                      color: def.color,
                      description: def.description,
                    });
                    core.info(`Created label: ${label}`);
                  } catch (createErr) {
                    if (createErr.status !== 422) {
                      core.warning(`Could not create label '${label}': ${createErr.message}`);
                    }
                  }
                }
              }
            }

            // === Create or update sync issue ===
            const { data: openResults } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'sync',
              state: 'open',
              per_page: 10,
            });

            const existingIssue = openResults
              .filter(i => !i.pull_request)
              .find(i => i.body?.includes(ISSUE_MARKER));

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                title,
                body,
                labels,
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `🔄 **Sync state refreshed** — ${date}\n\nNew upstream changes detected since last check. Issue body updated with latest diff.`,
              });

              core.info(`Updated existing sync issue #${existingIssue.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });

              core.info(`Created sync issue #${newIssue.number}: ${title}`);
            }
