name: Sync Check (Upstream)

on:
  workflow_call:
    inputs:
      upstream-repo:
        description: 'Upstream repo in owner/repo format'
        type: string
        default: 'bradygaster/squad'
      upstream-branch:
        description: 'Branch to monitor on the upstream repo'
        required: true
        type: string
      sync-label:
        description: 'Branch-specific sync label (e.g., sync:dev)'
        required: true
        type: string

permissions:
  issues: write
  contents: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream for new commits
        uses: actions/github-script@v8
        env:
          UPSTREAM_REPO: ${{ inputs.upstream-repo }}
          UPSTREAM_BRANCH: ${{ inputs.upstream-branch }}
          SYNC_LABEL: ${{ inputs.sync-label }}
        with:
          script: |
            const [upstreamOwner, upstreamRepo] = process.env.UPSTREAM_REPO.split('/');
            const upstreamBranch = process.env.UPSTREAM_BRANCH;
            const syncLabel = process.env.SYNC_LABEL;
            const baseLabels = ['sync', 'squad', syncLabel];

            // 1. Get the latest commit SHA on the upstream branch
            let latestSha;
            try {
              const { data: branch } = await github.rest.repos.getBranch({
                owner: upstreamOwner,
                repo: upstreamRepo,
                branch: upstreamBranch,
              });
              latestSha = branch.commit.sha;
            } catch (err) {
              core.setFailed(`Could not fetch upstream branch '${upstreamBranch}': ${err.message}`);
              return;
            }

            core.info(`Upstream ${upstreamBranch} HEAD: ${latestSha}`);

            // 2. Check for an existing open sync issue — avoid duplicates
            const { data: openResults } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['sync', syncLabel].join(','),
              state: 'open',
              per_page: 5,
            });

            const openIssues = openResults.filter(i => !i.pull_request);
            if (openIssues.length > 0) {
              core.info(`Open sync issue already exists: #${openIssues[0].number} — skipping`);
              return;
            }

            // 3. Find the last synced SHA from the most recent closed sync issue
            let lastSyncedSha = null;
            const { data: closedResults } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['sync', syncLabel].join(','),
              state: 'closed',
              sort: 'created',
              direction: 'desc',
              per_page: 5,
            });

            const closedIssues = closedResults.filter(i => !i.pull_request);
            for (const issue of closedIssues) {
              if (issue.body) {
                const match = issue.body.match(/<!-- upstream-sha: ([a-f0-9]+) -->/);
                if (match) {
                  lastSyncedSha = match[1];
                  core.info(`Last synced SHA: ${lastSyncedSha} (from issue #${issue.number})`);
                  break;
                }
              }
            }

            // 4. Short-circuit if nothing changed
            if (lastSyncedSha === latestSha) {
              core.info('No new commits since last sync check');
              return;
            }

            // 5. Get the commit diff
            let commits = [];
            let filesChanged = [];
            let totalCommits = 0;

            if (lastSyncedSha) {
              try {
                const { data: comparison } = await github.rest.repos.compareCommits({
                  owner: upstreamOwner,
                  repo: upstreamRepo,
                  base: lastSyncedSha,
                  head: latestSha,
                });
                commits = comparison.commits;
                filesChanged = comparison.files || [];
                totalCommits = comparison.total_commits || commits.length;
              } catch (err) {
                // Only fall back for divergence errors (404/409); fail on transient errors
                if (err.status === 404 || err.status === 409) {
                  core.warning(`Comparison failed (diverged history?): ${err.message} — falling back to recent commits`);
                  const { data: recent } = await github.rest.repos.listCommits({
                    owner: upstreamOwner,
                    repo: upstreamRepo,
                    sha: upstreamBranch,
                    per_page: 20,
                  });
                  commits = recent;
                  totalCommits = commits.length;
                } else {
                  core.setFailed(`GitHub API error during comparison: ${err.message}`);
                  return;
                }
              }
            } else {
              // First sync — grab recent commits for context
              const { data: recent } = await github.rest.repos.listCommits({
                owner: upstreamOwner,
                repo: upstreamRepo,
                sha: upstreamBranch,
                per_page: 20,
              });
              commits = recent;
              totalCommits = commits.length;
            }

            if (commits.length === 0) {
              core.info('No new commits found');
              return;
            }

            // 6. Build the issue body
            const date = new Date().toISOString().split('T')[0];

            // Sanitize commit messages — escape @ mentions to avoid pinging
            const sanitize = (msg) => msg.replace(/@/g, '`@`');

            const commitList = commits.slice(0, 30).map(c => {
              const msg = sanitize(c.commit.message.split('\n')[0]);
              const sha = c.sha.substring(0, 7);
              return `- [\`${sha}\`](https://github.com/${upstreamOwner}/${upstreamRepo}/commit/${c.sha}) ${msg}`;
            }).join('\n');

            let filesSummary = '';
            if (filesChanged.length > 0) {
              const list = filesChanged.slice(0, 50).map(f =>
                `- \`${f.filename}\` (+${f.additions}/-${f.deletions})`
              ).join('\n');
              const overflow = filesChanged.length > 50
                ? `\n- _... and ${filesChanged.length - 50} more files_`
                : '';
              filesSummary = `\n### Files Changed (${filesChanged.length})\n\n${list}${overflow}`;
            }

            const title = `Sync: upstream ${upstreamBranch} changes detected — ${date}`;
            const body = [
              `<!-- upstream-sha: ${latestSha} -->`,
              '',
              `New changes detected on [\`${upstreamBranch}\`](https://github.com/${upstreamOwner}/${upstreamRepo}/tree/${upstreamBranch}) in [${upstreamOwner}/${upstreamRepo}](https://github.com/${upstreamOwner}/${upstreamRepo}).`,
              '',
              `### Upstream Commits (${totalCommits})`,
              '',
              commitList,
              totalCommits > 30 ? `\n_... and ${totalCommits - 30} more commits_` : '',
              filesSummary,
              '',
              '### Sync Details',
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| Upstream repo | \`${upstreamOwner}/${upstreamRepo}\` |`,
              `| Branch | \`${upstreamBranch}\` |`,
              `| Latest SHA | \`${latestSha.substring(0, 7)}\` |`,
              lastSyncedSha ? `| Previous SHA | \`${lastSyncedSha.substring(0, 7)}\` |` : '| Previous SHA | _first sync check_ |',
              `| Detected | ${date} |`,
              '',
              '---',
              '> Close this issue once changes have been reviewed and ported to the .NET project.',
            ].join('\n');

            // 7. Ensure required labels exist (race-safe: ignore 422 on create)
            const labelDefs = {
              'sync':          { color: 'F9D0C4', description: 'Upstream sync tracking' },
              'sync:dev':      { color: 'FEF2C0', description: 'Changes on upstream dev branch' },
              'sync:insiders': { color: 'C2E0C6', description: 'Changes on upstream insiders branch' },
              'squad':         { color: '9B8FCC', description: 'Squad triage inbox' },
            };

            for (const label of baseLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch (err) {
                if (err.status === 404) {
                  try {
                    const def = labelDefs[label] || { color: 'EDEDED', description: '' };
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label,
                      color: def.color,
                      description: def.description,
                    });
                    core.info(`Created label: ${label}`);
                  } catch (createErr) {
                    // 422 means another run already created it — safe to ignore
                    if (createErr.status !== 422) {
                      core.warning(`Could not create label '${label}': ${createErr.message}`);
                    }
                  }
                } else {
                  core.warning(`Could not verify label '${label}': ${err.message}`);
                }
              }
            }

            // 8. Create the sync issue
            const { data: newIssue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: baseLabels,
            });

            core.info(`Created sync issue #${newIssue.number}: ${title}`);
